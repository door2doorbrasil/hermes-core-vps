name: hermes-core

x-hermes-common-env: &hermes-common-env
  HERMES_DISABLE_LAZY_INSTALLS: "1"
  OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
  BUY_IMAP_HOST: ${BUY_IMAP_HOST:?set BUY_IMAP_HOST}
  BUY_IMAP_PORT: ${BUY_IMAP_PORT:?set BUY_IMAP_PORT}
  BUY_IMAP_SSL: ${BUY_IMAP_SSL:-true}
  BUY_IMAP_USERNAME: ${BUY_IMAP_USERNAME:?set BUY_IMAP_USERNAME}
  BUY_IMAP_PASSWORD: ${BUY_IMAP_PASSWORD:?set BUY_IMAP_PASSWORD}
  BUY_SMTP_HOST: ${BUY_SMTP_HOST:?set BUY_SMTP_HOST}
  BUY_SMTP_PORT: ${BUY_SMTP_PORT:?set BUY_SMTP_PORT}
  BUY_SMTP_SSL: ${BUY_SMTP_SSL:-true}
  BUY_SMTP_USERNAME: ${BUY_SMTP_USERNAME:?set BUY_SMTP_USERNAME}
  BUY_SMTP_PASSWORD: ${BUY_SMTP_PASSWORD:?set BUY_SMTP_PASSWORD}
  SALES_IMAP_HOST: ${SALES_IMAP_HOST:-}
  SALES_IMAP_PORT: ${SALES_IMAP_PORT:-}
  SALES_IMAP_SSL: ${SALES_IMAP_SSL:-}
  SALES_IMAP_USERNAME: ${SALES_IMAP_USERNAME:-}
  SALES_IMAP_PASSWORD: ${SALES_IMAP_PASSWORD:-}
  SALES_SMTP_HOST: ${SALES_SMTP_HOST:-}
  SALES_SMTP_PORT: ${SALES_SMTP_PORT:-}
  SALES_SMTP_SSL: ${SALES_SMTP_SSL:-}
  SALES_SMTP_USERNAME: ${SALES_SMTP_USERNAME:-}
  SALES_SMTP_PASSWORD: ${SALES_SMTP_PASSWORD:-}
  HERMES_DASHBOARD_PUBLIC_URL: ${HERMES_DASHBOARD_PUBLIC_URL:-https://hermes.polarsinergy.com}

x-hermes-image: &hermes-image
  image: ${HERMES_IMAGE:?set HERMES_IMAGE}
  platform: linux/amd64

services:
  traefik:
    image: caddy:2.8-alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
    command:
      - -ec
      - |
        cat >/etc/caddy/Caddyfile <<EOF
        {
          auto_https disable_redirects
          email ${ACME_EMAIL:?set ACME_EMAIL}
        }

        http://hermes.polarsinergy.com {
          reverse_proxy hermes-agent:4860
        }

        http://webui.hermes.polarsinergy.com {
          reverse_proxy open-webui:8080
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge

  hermes-agent:
    <<: *hermes-image
    restart: unless-stopped
    command:
      - sleep
      - infinity
    environment:
      <<: *hermes-common-env
      HERMES_DASHBOARD: "true"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "4860"
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:?set HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:?set HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${HERMES_DASHBOARD_BASIC_AUTH_SECRET:?set HERMES_DASHBOARD_BASIC_AUTH_SECRET}
    volumes:
      - hermes-data:/opt/data
    expose:
      - "4860"
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - traefik.http.routers.hermes-dashboard.rule=Host(`${HERMES_DASHBOARD_HOSTNAME:-hermes.polarsinergy.com}`)
      - traefik.http.routers.hermes-dashboard.entrypoints=websecure
      - traefik.http.routers.hermes-dashboard.tls=true
      - traefik.http.routers.hermes-dashboard.tls.certresolver=letsencrypt
      - traefik.http.services.hermes-dashboard.loadbalancer.server.port=4860
    networks:
      - edge

  hermes-rfq-mail-worker:
    <<: *hermes-image
    restart: unless-stopped
    command:
      - python3
      - /opt/data/hermes-mail/scripts/rfq_email_worker.py
      - run
      - --interval
      - "120"
      - --max-replies
      - "10"
    environment:
      <<: *hermes-common-env
    volumes:
      - hermes-data:/opt/data
    depends_on:
      - hermes-agent
    networks:
      - edge

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    depends_on:
      - hermes-agent
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      NO_LOG: "1"
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - ./litellm.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4000"
    expose:
      - "4000"
    networks:
      - edge

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      - litellm
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      BYPASS_MODEL_ACCESS_CONTROL: "True"
      FORWARDED_ALLOW_IPS: "*"
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - open-webui-data:/app/backend/data
    expose:
      - "8080"
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - traefik.http.routers.hermes-webui.rule=Host(`${OPEN_WEBUI_HOSTNAME:-webui.hermes.polarsinergy.com}`)
      - traefik.http.routers.hermes-webui.entrypoints=websecure
      - traefik.http.routers.hermes-webui.tls=true
      - traefik.http.routers.hermes-webui.tls.certresolver=letsencrypt
      - traefik.http.services.hermes-webui.loadbalancer.server.port=8080
    networks:
      - edge

volumes:
  hermes-data:
  open-webui-data:
  caddy-data:
  caddy-config:

networks:
  edge:
    name: edge
