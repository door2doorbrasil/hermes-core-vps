services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped

    ports:
      - "4000:4000"

    env_file:
      - ../hermes-agent-fi18/.env

    environment:
      - LITELLM_MASTER_KEY=sk-local

    volumes:
      - ./config.yaml:/app/config.yaml

    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--host"
      - "0.0.0.0"

    networks:
      - web

networks:
  web:
    external: true
    name: hermes-agent-fi18_default
