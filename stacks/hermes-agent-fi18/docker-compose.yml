services:
  hermes-agent:
    image: ghcr.io/hostinger/hvps-hermes-agent:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "4860"
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${COMPOSE_PROJECT_NAME}.${TRAEFIK_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=4860
    env_file:
      - .env
    volumes:
      - ./data:/opt/data

  hermes-rfq-mail-worker:
    image: ghcr.io/hostinger/hvps-hermes-agent:latest
    platform: linux/amd64
    restart: unless-stopped
    command: ["python3", "/opt/data/hermes-mail/scripts/rfq_email_worker.py", "run", "--interval", "120", "--max-replies", "10"]
    env_file:
      - .env
    volumes:
      - ./data:/opt/data
