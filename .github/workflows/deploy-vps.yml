name: Deploy Hermes to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hermes-vps
  cancel-in-progress: true

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: publish-image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Recreate Hostinger VPS project
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_VPS_ID: "1783294"
          HOSTINGER_PROJECT_NAME: hermes-core
          HOSTINGER_STOP_PROJECTS: polar-sinergy,hermes-agent,hermes-gateway
          HOSTINGER_SMOKE_URL: https://hermes.polarsinergy.com/login?next=%2F
          HOSTINGER_SMOKE_EXPECT: password
          HOSTINGER_POLL_ATTEMPTS: "120"
          HERMES_IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_SERVER_KEY: ${{ secrets.API_SERVER_KEY }}
          HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${{ secrets.HERMES_DASHBOARD_BASIC_AUTH_USERNAME }}
          HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${{ secrets.HERMES_DASHBOARD_BASIC_AUTH_PASSWORD }}
          HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${{ secrets.HERMES_DASHBOARD_BASIC_AUTH_SECRET }}
          HERMES_DASHBOARD_PUBLIC_URL: https://hermes.polarsinergy.com
          HERMES_DASHBOARD_HOSTNAME: hermes.polarsinergy.com
          OPEN_WEBUI_HOSTNAME: webui.hermes.polarsinergy.com
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          WHATSAPP_ALLOWED_USERS: ${{ secrets.HERMES_WHATSAPP_ALLOWED_USERS }}
          BUY_IMAP_HOST: ${{ secrets.BUY_IMAP_HOST }}
          BUY_IMAP_PORT: ${{ secrets.BUY_IMAP_PORT }}
          BUY_IMAP_SSL: ${{ secrets.BUY_IMAP_SSL }}
          BUY_IMAP_USERNAME: ${{ secrets.BUY_IMAP_USERNAME }}
          BUY_IMAP_PASSWORD: ${{ secrets.BUY_IMAP_PASSWORD }}
          BUY_SMTP_HOST: ${{ secrets.BUY_SMTP_HOST }}
          BUY_SMTP_PORT: ${{ secrets.BUY_SMTP_PORT }}
          BUY_SMTP_SSL: ${{ secrets.BUY_SMTP_SSL }}
          BUY_SMTP_USERNAME: ${{ secrets.BUY_SMTP_USERNAME }}
          BUY_SMTP_PASSWORD: ${{ secrets.BUY_SMTP_PASSWORD }}
          SALES_IMAP_HOST: ${{ secrets.SALES_IMAP_HOST }}
          SALES_IMAP_PORT: ${{ secrets.SALES_IMAP_PORT }}
          SALES_IMAP_SSL: ${{ secrets.SALES_IMAP_SSL }}
          SALES_IMAP_USERNAME: ${{ secrets.SALES_IMAP_USERNAME }}
          SALES_IMAP_PASSWORD: ${{ secrets.SALES_IMAP_PASSWORD }}
          SALES_SMTP_HOST: ${{ secrets.SALES_SMTP_HOST }}
          SALES_SMTP_PORT: ${{ secrets.SALES_SMTP_PORT }}
          SALES_SMTP_SSL: ${{ secrets.SALES_SMTP_SSL }}
          SALES_SMTP_USERNAME: ${{ secrets.SALES_SMTP_USERNAME }}
          SALES_SMTP_PASSWORD: ${{ secrets.SALES_SMTP_PASSWORD }}
        run: python3 deploy/hostinger/deploy.py
